<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Keyword Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Custom CSS for URL truncation */
        .url-link {
            display: inline-block;
            max-width: 250px; /* Adjust as needed */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mt-5">Keyword Monitor</h1>

    <div class="card mt-4">
        <div class="card-header">
            Add New Site to Monitor
        </div>
        <div class="card-body">
            <form id="monitorForm">
                <div class="mb-3">
                    <label for="url" class="form-label">URL</label>
                    <input type="text" class="form-control" id="url" name="url" required>
                </div>
                <div class="mb-3">
                    <label for="keyword" class="form-label">Keywords (comma separated)</label>
                    <input type="text" class="form-control" id="keyword" name="keyword" placeholder="e.g. keyword1, keyword2, keyword3" required>
                    <div class="form-text">Enter multiple keywords separated by commas. Notifications will be sent if the count of any keyword increases.</div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email">
                </div>
                <div class="mb-3">
                    <label for="telegramChatId" class="form-label">Telegram Chat ID</label>
                    <input type="text" class="form-control" id="telegramChatId" name="telegramChatId">
                </div>
                <button type="submit" class="btn btn-primary">Add Monitor</button>
            </form>
        </div>
    </div>

    <h2 class="mt-5">Monitored Sites</h2>
    <table class="table table-striped table-sm mt-4"> <!-- Added table-sm class -->
        <thead>
        <tr>
            <th>ID</th>
            <th>URL</th>
            <th>Keywords</th>
            <th>Email</th>
            <th>Telegram Chat ID</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="monitoredSites">
        </tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const monitorForm = document.getElementById('monitorForm');
        const monitoredSites = document.getElementById('monitoredSites');

        // Fetch and display monitored sites
        function fetchMonitoredSites() {
            fetch('/api/monitor')
                .then(response => response.json())
                .then(data => {
                    monitoredSites.innerHTML = '';
                    if (data.data) {
                        data.data.forEach(site => {
                            const row = `
                                <tr>
                                    <td>${site.id}</td>
                                    <td><a href="${site.url}" target="_blank" class="url-link">${site.url}</a></td>
                                    <td>${site.keyword}</td>
                                    <td>${site.email}</td>
                                    <td>${site.telegramChatId}</td>
                                    <td>
                                        <button class="btn btn-danger btn-sm" onclick="deleteMonitor(${site.id})">Delete</button>
                                    </td>
                                </tr>
                            `;
                            monitoredSites.innerHTML += row;
                        });
                    }
                });
        }

        // Add a new monitored site
        monitorForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const formData = new FormData(monitorForm);
            const data = Object.fromEntries(formData.entries());

            fetch('/api/monitor', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    fetchMonitoredSites();
                    monitorForm.reset();
                } else {
                    alert('Error: ' + data.message);
                }
            });
        });

        // Delete a monitored site
        window.deleteMonitor = function(id) {
            if (confirm('Are you sure you want to delete this site?')) {
                fetch(`/api/monitor/${id}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        fetchMonitoredSites();
                    } else {
                        alert('Error: ' + data.message);
                    }
                });
            }
        }

        fetchMonitoredSites();
    });
</script>
</body>
</html>
