spring:
  application:
    name: keyword-check-hub

  # Data Source Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# Automatic email senders  -- I am using SendGrid free tier plan.
app:
  # SendGrid Configuration
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
    from-email: 174g1a0245@srit.ac.in # Replace with your verified SendGrid sender email

  # Telegram Configuration
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN}
    api-url: https://api.telegram.org/bot

  # Website monitoring configuration
  monitor:
    check-interval: 400000  # 5 minutes in milliseconds
    connection-timeout: 60000  # 60 seconds
    read-timeout: 10000  # 10 seconds
    user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36

# Logging Configuration
logging:
  level:
    root: INFO
    com.notificationhub: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/keyword-monitor.log

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
scheduler:
  keyword:
    fixedRate: 15
    initialDelay: 1
  health:
    fixedRate: 600
    initialDelay: 1
